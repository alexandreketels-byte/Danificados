<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Danificados</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0f1117; --bg2:#161925; --card:#1b1f2e; --border:#2a2f42;
    --text:#e8eaf0; --muted:#8892a6; --accent:#ff8a3d; --accent2:#ffb37a;
    --green:#3ddc84; --red:#ff5d5d; --yellow:#ffd23d;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;font-size:13px;}
  header{background:var(--bg2);padding:14px 20px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header h1{font-size:18px;margin:0;color:var(--accent);}
  header h1 span{color:var(--muted);font-weight:normal;font-size:12px;display:block;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  button{background:var(--card);color:var(--text);border:1px solid var(--border);
    padding:8px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:.15s;}
  button:hover{border-color:var(--accent);color:var(--accent2);}
  button.primary{background:var(--accent);border-color:var(--accent);color:#1a1200;font-weight:600;}
  button.primary:hover{background:var(--accent2);color:#1a1200;}
  button.danger{border-color:var(--red);color:var(--red);}
  button.small{padding:4px 8px;font-size:11px;}
  .globalSearch{display:flex;align-items:center;gap:8px;padding:12px 20px 0;}
  .globalSearch input{flex:1;max-width:420px;background:var(--card);border:1px solid var(--border);
    color:var(--text);padding:9px 12px;border-radius:7px;font-size:13px;}
  .globalSearch input:focus{outline:none;border-color:var(--accent);}
  .globalSearch small{color:var(--muted);}
  main{padding:10px 20px 16px;}
  .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px;max-height:76vh;}
  table{border-collapse:collapse;width:100%;min-width:1500px;}
  th,td{padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left;}
  thead th{background:var(--bg2);position:sticky;top:0;z-index:2;vertical-align:top;}
  .th-top{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:4px;}
  .th-top .colname{font-weight:600;color:var(--accent2);}
  .sortbtn{background:none;border:none;color:var(--muted);cursor:pointer;padding:0 2px;font-size:12px;}
  .sortbtn:hover{color:var(--accent2);}
  .sortbtn.active{color:var(--accent);}
  th input.filterInput{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);
    border-radius:4px;padding:4px 6px;font-size:11px;}
  th input.filterInput::placeholder{color:#556;}
  tbody tr:hover{background:#20243380;}
  td a{color:var(--accent2);}
  .badge{padding:2px 7px;border-radius:10px;font-size:10.5px;font-weight:600;}
  .badge.sim{background:#3ddc8422;color:var(--green);}
  .badge.nao{background:#8892a622;color:var(--muted);}
  .badge.aberto{background:#ffd23d22;color:var(--yellow);}
  .badge.finalizado{background:#3ddc8422;color:var(--green);}
  .acoes{display:flex;gap:4px;flex-wrap:wrap;min-width:180px;}
  /* Modal */
  .overlay{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;width:340px;}
  .modal h3{margin:0 0 12px;color:var(--accent2);font-size:15px;}
  .modal label{display:block;margin:10px 0 4px;color:var(--muted);font-size:12px;}
  .modal input[type=text],.modal input[type=password]{width:100%;padding:8px;border-radius:6px;
    border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;}
  .modal .chk{display:flex;align-items:center;gap:8px;margin:10px 0;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .msg{font-size:12px;margin-top:8px;min-height:16px;}
  .msg.err{color:var(--red);}
  .msg.ok{color:var(--green);}
  .col-picker{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;max-height:300px;overflow:auto;}
  .col-picker label{display:flex;gap:6px;align-items:center;color:var(--text);font-size:12px;}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);
    padding:12px 18px;border-radius:8px;z-index:99;display:none;}
  .toast.show{display:block;}
  .toast.ok{border-color:var(--green);color:var(--green);}
  .toast.err{border-color:var(--red);color:var(--red);}
  .loading{padding:40px;text-align:center;color:var(--muted);}
  .gestor-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
  .gestor-row span{flex:1;}
</style>
</head>
<body>

<header>
  <h1>Portal de Danificados <span id="resumo">carregando...</span></h1>
  <div class="toolbar">
    <button id="btnCols">Colunas</button>
    <button id="btnClearFilters">Limpar Filtros</button>
    <button id="btnImport">Importar CSV</button>
    <button id="btnExport">Exportar Excel</button>
    <button id="btnAdmin">Área ADM</button>
    <button id="btnRefresh">Atualizar</button>
    <input type="file" id="fileInput" accept=".csv" style="display:none">
  </div>
</header>

<div class="globalSearch">
  <input type="text" id="globalSearch" placeholder="Buscar em todos os campos (pedido, OS, descrição, defeito, fotos...)">
  <small id="globalSearchCount"></small>
</div>

<main>
  <div class="table-wrap"><div class="loading">Carregando dados...</div></div>
</main>

<!-- ===== Modal: seletor de colunas ===== -->
<div class="overlay" id="ovCols">
  <div class="modal" style="width:420px;">
    <h3>Colunas visíveis</h3>
    <div class="col-picker" id="colPicker"></div>
    <div class="modal-actions">
      <button onclick="closeModal('ovCols')">Fechar</button>
      <button class="primary" onclick="applyColumns()">Aplicar</button>
    </div>
  </div>
</div>

<!-- ===== Modal: reservar ===== -->
<div class="overlay" id="ovReservar">
  <div class="modal">
    <h3>Reservar item <span id="rPedido" style="color:var(--muted);font-weight:normal;"></span></h3>
    <div class="chk"><input type="checkbox" id="chkReservar" checked><label for="chkReservar" style="margin:0;">Reservar máquina</label></div>
    <div class="chk"><input type="checkbox" id="chkConverter"><label for="chkConverter" style="margin:0;">Converter OS p/ Cód. Danificado</label></div>
    <label>Sua senha (4 dígitos)</label>
    <input type="password" maxlength="4" id="pinReservar" placeholder="••••">
    <div class="msg" id="msgReservar"></div>
    <div class="modal-actions">
      <button onclick="closeModal('ovReservar')">Cancelar</button>
      <button class="primary" onclick="confirmarReserva()">Salvar</button>
    </div>
  </div>
</div>

<!-- ===== Modal: desfazer reserva ===== -->
<div class="overlay" id="ovDesfazer">
  <div class="modal">
    <h3>Desfazer reserva <span id="dPedido" style="color:var(--muted);font-weight:normal;"></span></h3>
    <label>Sua senha (4 dígitos)</label>
    <input type="password" maxlength="4" id="pinDesfazer" placeholder="••••">
    <div class="msg" id="msgDesfazer"></div>
    <div class="modal-actions">
      <button onclick="closeModal('ovDesfazer')">Cancelar</button>
      <button class="danger" onclick="confirmarDesfazer()">Desfazer</button>
    </div>
  </div>
</div>

<!-- ===== Modal: numero do pedido (gestor) ===== -->
<div class="overlay" id="ovPedido">
  <div class="modal">
    <h3>Lançar nº do pedido <span id="pPedidoLabel" style="color:var(--muted);font-weight:normal;"></span></h3>
    <label>Número do pedido</label>
    <input type="text" id="numPedidoInput" placeholder="Ex: 480123">
    <label>Sua senha (4 dígitos)</label>
    <input type="password" maxlength="4" id="pinPedido" placeholder="••••">
    <div class="msg" id="msgPedido"></div>
    <div class="modal-actions">
      <button onclick="closeModal('ovPedido')">Cancelar</button>
      <button class="primary" onclick="confirmarNumPedido()">Salvar</button>
    </div>
  </div>
</div>

<!-- ===== Modal: ADM login (genérico p/ ações admin) ===== -->
<div class="overlay" id="ovAdmAction">
  <div class="modal">
    <h3 id="admActionTitle">Ação ADM</h3>
    <div id="admActionExtra"></div>
    <label>PIN do ADM</label>
    <input type="password" maxlength="10" id="pinAdmAction" placeholder="••••">
    <div class="msg" id="msgAdmAction"></div>
    <div class="modal-actions">
      <button onclick="closeModal('ovAdmAction')">Cancelar</button>
      <button class="primary" id="btnAdmActionConfirm">Salvar</button>
    </div>
  </div>
</div>

<!-- ===== Modal: painel ADM (gestores + import) ===== -->
<div class="overlay" id="ovAdmin">
  <div class="modal" style="width:420px;">
    <h3>Área do ADM</h3>
    <div id="admGate">
      <label>PIN do ADM</label>
      <input type="password" id="pinAdmGate" placeholder="••••">
      <div class="msg" id="msgAdmGate"></div>
      <div class="modal-actions">
        <button onclick="closeModal('ovAdmin')">Cancelar</button>
        <button class="primary" onclick="entrarAdmin()">Entrar</button>
      </div>
    </div>
    <div id="admPanel" style="display:none;">
      <h4 style="color:var(--accent2);margin-bottom:6px;">Gestores</h4>
      <div id="gestoresList"></div>
      <div class="gestor-row">
        <input type="text" id="novoGestorNome" placeholder="Nome" style="flex:1;">
        <input type="text" id="novoGestorPin" placeholder="PIN" maxlength="4" style="width:70px;">
        <button class="small primary" onclick="adicionarGestor()">+</button>
      </div>
      <div class="msg" id="msgAdmin"></div>
      <div class="modal-actions">
        <button onclick="closeModal('ovAdmin')">Fechar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ==================== CONFIGURAÇÃO ==================== */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBEtaCXQSKQDZd0fTLybSJtX-gK6_X42HMmcTvLGPHxAfiYzwq9cdaHtYOOiDQOez5/exec'; // ex: https://script.google.com/macros/s/XXX/exec
const LS_PREFIX = 'portalDanificados_'; // prefixo único p/ não colidir com outros portais no mesmo domínio

const HEADERS = [
  'PEDIDO','OS','OS2','FABRICANTE','STATUS','DESCRICAO','COD','BTUS',
  'NF_FABRICA','PRECO_CUSTO','PRECO_VENDA2','PCT_DESCONTO','LIQUIDACAO',
  'SETOR','FOTOS','DEFEITO',
  'RESERVADO','RESERVADO_POR','CONVERTER_OS',
  'COD_DANIFICADO_CONVERTIDO','NUM_PEDIDO','STATUS_RESERVA'
];
const LABELS = {
  PEDIDO:'Pedido', OS:'OS', OS2:'OS2', FABRICANTE:'Fabricante', STATUS:'Status Item',
  DESCRICAO:'Descrição', COD:'Cód', BTUS:'BTUs', NF_FABRICA:'NF Fábrica',
  PRECO_CUSTO:'Preço Custo', PRECO_VENDA2:'Preço Venda', PCT_DESCONTO:'% Desconto',
  LIQUIDACAO:'Liquidação', SETOR:'Setor', FOTOS:'Fotos', DEFEITO:'Defeito',
  RESERVADO:'Reservado', RESERVADO_POR:'Reservado Por', CONVERTER_OS:'Converter OS',
  COD_DANIFICADO_CONVERTIDO:'Cód. Danificado', NUM_PEDIDO:'Nº Pedido', STATUS_RESERVA:'Status'
};
// colunas numéricas/monetárias/percentuais -> usadas pra ordenar corretamente
const NUMERIC_COLS = new Set(['OS','OS2','COD','BTUS','PRECO_CUSTO','PRECO_VENDA2','PCT_DESCONTO','LIQUIDACAO']);
const DEFAULT_VISIBLE = HEADERS.slice();

let RAW_ROWS = [];
let FILTERS = {};       // { coluna: textoDeBusca }
let GLOBAL_SEARCH = '';
let SORT = { col: null, dir: 'asc' };
let VISIBLE_COLS = JSON.parse(localStorage.getItem(LS_PREFIX+'cols') || 'null') || DEFAULT_VISIBLE.slice();
let currentAction = null; // OS do item em contexto no modal atual
let admSessionPin = null;

/* ==================== API ==================== */
async function apiGet(action, params={}){
  const url = new URL(APPS_SCRIPT_URL);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(k=>url.searchParams.set(k, params[k]));
  const res = await fetch(url);
  return res.json();
}
async function apiPost(action, payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // evita preflight CORS
    body: JSON.stringify({action, payload})
  });
  return res.json();
}

/* ==================== CARREGAR DADOS ==================== */
async function loadData(){
  document.querySelector('.table-wrap').innerHTML = '<div class="loading">Carregando dados...</div>';
  try{
    const data = await apiGet('getData');
    if(!data.ok) throw new Error(data.error || 'Erro ao carregar');
    RAW_ROWS = data.rows;
    document.getElementById('resumo').textContent = RAW_ROWS.length + ' itens carregados';
    renderTable();
  }catch(err){
    document.querySelector('.table-wrap').innerHTML = '<div class="loading">Erro ao carregar: '+err.message+'<br><small>Confira se APPS_SCRIPT_URL está configurada no código.</small></div>';
  }
}

/* ==================== FILTROS / BUSCA / ORDENAÇÃO ==================== */
function uniqueValues(col){
  const set = new Set(RAW_ROWS.map(r => (r[col]===undefined||r[col]===null||r[col]==='') ? '' : String(r[col])));
  set.delete('');
  return Array.from(set).sort();
}

function numericValue(col, val){
  if(val===undefined || val===null || val==='') return null;
  if(typeof val === 'number') return val;
  let s = String(val).trim();
  // remove símbolo de moeda/percentual e normaliza separador decimal BR (1.234,56 -> 1234.56)
  s = s.replace(/R\$\s?/i,'').replace(/%/g,'').trim();
  if(s.includes(',') ){
    s = s.replace(/\./g,'').replace(',', '.');
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function applyFilters(rows){
  let out = rows.filter(r=>{
    return Object.keys(FILTERS).every(col=>{
      const f = FILTERS[col];
      if(!f) return true;
      const val = (r[col]===undefined||r[col]===null) ? '' : String(r[col]);
      return val.toLowerCase().includes(f.toLowerCase());
    });
  });
  if(GLOBAL_SEARCH){
    const term = GLOBAL_SEARCH.toLowerCase();
    out = out.filter(r => HEADERS.some(col=>{
      const val = (r[col]===undefined||r[col]===null) ? '' : String(r[col]);
      return val.toLowerCase().includes(term);
    }));
  }
  return out;
}

function applySort(rows){
  if(!SORT.col) return rows;
  const col = SORT.col, dir = SORT.dir === 'asc' ? 1 : -1;
  const isNum = NUMERIC_COLS.has(col);
  return rows.slice().sort((a,b)=>{
    let va = a[col], vb = b[col];
    if(isNum){
      va = numericValue(col, va); vb = numericValue(col, vb);
      if(va===null && vb===null) return 0;
      if(va===null) return 1; // vazios vão pro fim
      if(vb===null) return -1;
      return (va - vb) * dir;
    }
    va = (va===undefined||va===null) ? '' : String(va).toLowerCase();
    vb = (vb===undefined||vb===null) ? '' : String(vb).toLowerCase();
    if(va < vb) return -1 * dir;
    if(va > vb) return 1 * dir;
    return 0;
  });
}

function setFilter(col, val){ FILTERS[col] = val || null; renderTable(); }
function setSort(col){
  if(SORT.col === col){
    SORT.dir = SORT.dir === 'asc' ? 'desc' : 'asc';
  } else {
    SORT.col = col; SORT.dir = 'asc';
  }
  renderTable();
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

document.getElementById('globalSearch').addEventListener('input', (e)=>{
  GLOBAL_SEARCH = e.target.value.trim();
  renderTable();
});
document.getElementById('btnClearFilters').onclick = ()=>{
  FILTERS = {}; GLOBAL_SEARCH = ''; SORT = {col:null, dir:'asc'};
  document.getElementById('globalSearch').value = '';
  renderTable();
};

/* ==================== RENDER TABELA ==================== */
function renderTable(){
  let rows = applyFilters(RAW_ROWS);
  rows = applySort(rows);
  const cols = HEADERS.filter(h => VISIBLE_COLS.includes(h));

  let html = '<table><thead><tr>';
  cols.forEach(c=>{
    const dlId = 'dl_'+c;
    const arrow = SORT.col === c ? (SORT.dir==='asc' ? '▲' : '▼') : '↕';
    const arrowClass = SORT.col === c ? 'sortbtn active' : 'sortbtn';
    html += `<th>
      <div class="th-top">
        <span class="colname">${LABELS[c]||c}</span>
        <button class="${arrowClass}" title="Ordenar" onclick="setSort('${c}')">${arrow}</button>
      </div>
      <input class="filterInput" list="${dlId}" placeholder="Filtrar..." value="${escapeHtml(FILTERS[c]||'')}"
        oninput="setFilter('${c}', this.value)">
      <datalist id="${dlId}">
        ${uniqueValues(c).map(v=>`<option value="${escapeHtml(v)}">`).join('')}
      </datalist>
    </th>`;
  });
  html += '<th>Ações</th></tr></thead><tbody>';

  rows.forEach(r=>{
    html += '<tr>';
    cols.forEach(c=>{
      html += `<td>${renderCell(c, r)}</td>`;
    });
    html += `<td class="acoes">${renderAcoes(r)}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';

  document.querySelector('.table-wrap').innerHTML = html;
  document.getElementById('resumo').textContent = rows.length + ' de ' + RAW_ROWS.length + ' itens';
  document.getElementById('globalSearchCount').textContent = GLOBAL_SEARCH ? (rows.length + ' resultado(s)') : '';
}

function renderCell(col, r){
  const v = r[col];
  if(col === 'FOTOS' && v) return `<a href="${escapeHtml(v)}" target="_blank">ver fotos</a>`;
  if(col === 'RESERVADO') return v==='Sim' ? '<span class="badge sim">Sim</span>' : '<span class="badge nao">Não</span>';
  if(col === 'CONVERTER_OS') return v==='Sim' ? '<span class="badge sim">Sim</span>' : '<span class="badge nao">Não</span>';
  if(col === 'STATUS_RESERVA'){
    if(v==='Finalizado') return '<span class="badge finalizado">Finalizado</span>';
    if(v==='Aberto') return '<span class="badge aberto">Aberto</span>';
    return '';
  }
  return v===undefined||v===null ? '' : escapeHtml(String(v));
}

// Identificador único de cada linha é a coluna OS (PEDIDO pode se repetir)
function renderAcoes(r){
  const os = r.OS;
  let btns = '';
  if(r.RESERVADO !== 'Sim'){
    btns += `<button class="small primary" onclick="abrirReservar('${os}')">Reservar</button>`;
  } else {
    btns += `<button class="small danger" onclick="abrirDesfazer('${os}')">Desfazer</button>`;
    btns += `<button class="small" onclick="abrirAdmConverter('${os}')">ADM: Cód.</button>`;
    if(r.COD_DANIFICADO_CONVERTIDO){
      btns += `<button class="small" onclick="abrirNumPedido('${os}')">Nº Pedido</button>`;
    }
    btns += `<button class="small" onclick="abrirAdmStatus('${os}')">ADM: Status</button>`;
  }
  return btns;
}

/* ==================== SELETOR DE COLUNAS ==================== */
document.getElementById('btnCols').onclick = ()=>{
  const box = document.getElementById('colPicker');
  box.innerHTML = HEADERS.map(h=>`
    <label><input type="checkbox" value="${h}" ${VISIBLE_COLS.includes(h)?'checked':''}> ${LABELS[h]||h}</label>
  `).join('');
  openModal('ovCols');
};
function applyColumns(){
  const checked = Array.from(document.querySelectorAll('#colPicker input:checked')).map(i=>i.value);
  VISIBLE_COLS = checked;
  localStorage.setItem(LS_PREFIX+'cols', JSON.stringify(VISIBLE_COLS));
  closeModal('ovCols');
  renderTable();
}

/* ==================== MODAIS GENÉRICOS ==================== */
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){
  document.getElementById(id).classList.remove('show');
  document.querySelectorAll(`#${id} .msg`).forEach(m=>{m.textContent='';m.className='msg';});
  document.querySelectorAll(`#${id} input`).forEach(i=>{ if(i.type!=='checkbox') i.value=''; });
}
function showMsg(id, text, ok){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}
function toast(text, ok=true){
  const t = document.getElementById('toast');
  t.textContent = text;
  t.className = 'toast show ' + (ok?'ok':'err');
  setTimeout(()=>t.className='toast', 2500);
}

/* ==================== RESERVAR ==================== */
function abrirReservar(os){
  currentAction = os;
  document.getElementById('rPedido').textContent = 'OS #'+os;
  document.getElementById('chkReservar').checked = true;
  document.getElementById('chkConverter').checked = false;
  openModal('ovReservar');
}
async function confirmarReserva(){
  const reservar = document.getElementById('chkReservar').checked;
  const converter = document.getElementById('chkConverter').checked;
  const pin = document.getElementById('pinReservar').value.trim();
  if(pin.length !== 4){ showMsg('msgReservar','Digite os 4 dígitos do seu PIN.', false); return; }
  const res = await apiPost('reservar', {os: currentAction, reservar, converter, pin});
  if(res.ok){ toast('Reservado para '+res.gestor+'!'); closeModal('ovReservar'); loadData(); }
  else showMsg('msgReservar', res.error, false);
}

/* ==================== DESFAZER RESERVA ==================== */
function abrirDesfazer(os){
  currentAction = os;
  document.getElementById('dPedido').textContent = 'OS #'+os;
  openModal('ovDesfazer');
}
async function confirmarDesfazer(){
  const pin = document.getElementById('pinDesfazer').value.trim();
  if(pin.length !== 4){ showMsg('msgDesfazer','Digite os 4 dígitos do seu PIN.', false); return; }
  const res = await apiPost('desfazerReserva', {os: currentAction, pin});

/* ==================== IMPORTAR CSV ==================== */
document.getElementById('btnImport').onclick = ()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const admPin = prompt('PIN do ADM para importar:');
  if(!admPin) return;
  const text = await readFileSmart(file);
  const rows = parseCSV(text);
  if(!rows.length){ toast('Nenhuma linha válida encontrada no CSV.', false); return; }

  // envia em blocos de 200 linhas
  const CHUNK = 200;
  let inseridas=0, atualizadas=0, ignoradas=0;
  for(let i=0;i<rows.length;i+=CHUNK){
    const chunk = rows.slice(i, i+CHUNK);
    const res = await apiPost('importCSV', {rows: chunk, admPin});
    if(!res.ok){ toast('Erro na importação: '+res.error, false); return; }
    inseridas += res.inseridas; atualizadas += res.atualizadas; ignoradas += res.ignoradas;
  }
  toast(`Importação concluída: ${inseridas} novos, ${atualizadas} atualizados, ${ignoradas} ignorados.`);
  loadData();
  e.target.value = '';
};

// Lê o arquivo tentando UTF-8 primeiro; se os bytes não formarem UTF-8 válido
// (comum em CSV exportado do Excel no Brasil, que usa Windows-1252/ISO-8859-1),
// refaz a leitura nessa codificação pra não corromper acentos.
async function readFileSmart(file){
  const buffer = await file.arrayBuffer();
  try{
    return new TextDecoder('utf-8', {fatal:true}).decode(buffer);
  }catch(e){
    return new TextDecoder('windows-1252').decode(buffer);
  }
}

// Remove acentos, espaços e símbolos dos cabeçalhos, pra casar com os nomes internos
// (ex: "DESCRIÇÃO" -> "DESCRICAO", "PREÇO CUSTO" -> "PRECO_CUSTO", "% desconto" -> "PCT_DESCONTO")
function normalizeHeader(h){
  return h
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove acentos
    .trim()
    .toUpperCase()
    .replace(/%/g, 'PCT')
    .replace(/[^A-Z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

// Casos em que o nome normalizado ainda não bate 100% com o nome interno usado no sistema
const HEADER_ALIASES = {
  'PRECO_DE_VENDA2': 'PRECO_VENDA2',
  'PRECO_DE_VENDA_2': 'PRECO_VENDA2',
  'PRECO_VENDA_2': 'PRECO_VENDA2',
  'PRECO_DE_VENDA': 'PRECO_VENDA2',
  'NF_FABRICA_': 'NF_FABRICA',
  'NF_FABRICANTE': 'NF_FABRICA'
};

function parseCSV(text){
  // parser simples com suporte a aspas e ; ou , como separador
  const sep = text.split('\n')[0].includes(';') ? ';' : ',';
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length);
  if(!lines.length) return [];
  const headers = splitCsvLine(lines[0], sep).map(h=>{
    const norm = normalizeHeader(h);
    return HEADER_ALIASES[norm] || norm;
  });
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const cols = splitCsvLine(lines[i], sep);
    const obj = {};
    headers.forEach((h,idx)=> obj[h] = (cols[idx]||'').trim());
    rows.push(obj);
  }
  return rows;
}
function splitCsvLine(line, sep){
  const out = []; let cur=''; let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c === '"'){ inQuotes = !inQuotes; continue; }
    if(c === sep && !inQuotes){ out.push(cur); cur=''; continue; }
    cur += c;
  }
  out.push(cur);
  return out;
}

/* ==================== EXPORTAR EXCEL ==================== */
document.getElementById('btnExport').onclick = ()=>{
  let rows = applyFilters(RAW_ROWS);
  rows = applySort(rows);
  const cols = HEADERS.filter(h => VISIBLE_COLS.includes(h));
  const data = rows.map(r=>{
    const obj = {};
    cols.forEach(c=> obj[LABELS[c]||c] = r[c]);
    return obj;
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Danificados');
  XLSX.writeFile(wb, 'danificados_'+new Date().toISOString().slice(0,10)+'.xlsx');
};
